name: Deploy and Update README

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

      - name: Update README with News
        run: |
          LAST_COMMIT_MSG=$(git log -1 --pretty=%s)
          DATE=$(date +'%d/%m/%Y %H:%M')
          
          # Check if "## 🆕 Novità" section exists
          if grep -q "## 🆕 Novità" README.md; then
            # Replace the first line after the header (or just append)
            # For simplicity, we'll keep the last 5 updates if we wanted to be fancy, 
            # but here we'll just update the section.
            sed -i "/## 🆕 Novità/q" README.md
            echo "- **$DATE**: $LAST_COMMIT_MSG" >> README.md
            echo "" >> README.md
            echo "## 📄 License" >> README.md
            echo "This project is licensed under the MIT License - see the [LICENSE](LICENSE) file for details." >> README.md
          else
            # Insert before License
            sed -i "/## 📄 License/i ## 🆕 Novità\n- **$DATE**: $LAST_COMMIT_MSG\n" README.md
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update README with latest deploy news [skip ci]" || echo "No changes to commit"
          git push
